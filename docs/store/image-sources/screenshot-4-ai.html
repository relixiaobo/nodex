<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=800">
<title>Screenshot 4 — Think with AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 800px; background: #F5F4EE;
    font-family: 'Inter', system-ui, sans-serif; overflow: hidden;
    display: flex; align-items: center; justify-content: center; gap: 80px;
  }
  .text-side { max-width: 400px; }
  .text-side h1 {
    font-size: 40px; font-weight: 600; color: #1A1A1A;
    letter-spacing: -1.2px; line-height: 1.15; margin-bottom: 16px;
  }
  .text-side p { font-size: 18px; color: #666; line-height: 1.6; }

  .phone-frame {
    width: 380px; height: 680px; background: #fff; border-radius: 16px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.08), 0 24px 64px rgba(0,0,0,0.06);
    overflow: hidden;
  }
  .phone-frame img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
</style>
</head>
<body>
  <div class="text-side">
    <h1>Think with AI</h1>
    <p>Pull up the chat drawer — it's right below your notes. Your AI sees the actual notes, not a copy-paste. It pushes back on a weak argument, suggests a structure, edits a node for you. You think out loud; it thinks with you.</p>
  </div>
  <div class="phone-frame">
    <img src="../images/screenshot-4-ai.png" alt="Think with AI">
  </div>
