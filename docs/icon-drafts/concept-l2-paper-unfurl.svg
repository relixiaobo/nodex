<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- L2: Paper Unfurling — 无背景，叶子填满全部空间 -->
  <defs>
    <filter id="ps" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0.3" dy="0.8" stdDeviation="1" flood-color="#3D3020" flood-opacity="0.15"/>
    </filter>

    <linearGradient id="pG" x1="0.3" y1="1" x2="0.7" y2="0">
      <stop offset="0%" stop-color="#4D7A54"/>
      <stop offset="100%" stop-color="#6A9A70"/>
    </linearGradient>
    <linearGradient id="pA" x1="0.3" y1="1" x2="0.7" y2="0">
      <stop offset="0%" stop-color="#D4944C"/>
      <stop offset="100%" stop-color="#EBAD6A"/>
    </linearGradient>
    <linearGradient id="pR" x1="0.3" y1="1" x2="0.7" y2="0">
      <stop offset="0%" stop-color="#964440"/>
      <stop offset="100%" stop-color="#C06058"/>
    </linearGradient>
  </defs>

  <!-- No background — transparent, leaves fill the space -->
  <!-- scale 1.85×, wider fan angles, centered to fill 128×128 -->
  <g transform="translate(54, 122) scale(1.85)">

    <!-- Green paper (largest, bottom) -->
    <path d="M0,0 C-16,-20 -20,-48 -6,-66 C0,-72 4,-72 8,-66 C20,-46 18,-18 0,0Z"
          fill="url(#pG)" transform="rotate(28)" filter="url(#ps)"/>
    <path d="M0,0 C-16,-20 -20,-48 -6,-66 C0,-72 4,-72 8,-66 C20,-46 18,-18 0,0Z"
          fill="none" stroke="white" stroke-width="0.4" stroke-opacity="0.2"
          transform="rotate(28)"/>

    <!-- Amber paper (medium, middle) -->
    <path d="M0,0 C-10,-12 -13,-30 -4,-40 C0,-44 3,-44 6,-40 C13,-28 11,-11 0,0Z"
          fill="url(#pA)" transform="rotate(-12)" filter="url(#ps)"/>
    <path d="M0,0 C-10,-12 -13,-30 -4,-40 C0,-44 3,-44 6,-40 C13,-28 11,-11 0,0Z"
          fill="none" stroke="white" stroke-width="0.35" stroke-opacity="0.25"
          transform="rotate(-12)"/>

    <!-- Red paper (smallest, top — the seed) -->
    <path d="M0,0 C-6,-8 -8,-18 -2,-25 C0,-28 2,-28 4,-25 C9,-17 7,-7 0,0Z"
          fill="url(#pR)" transform="rotate(-58)" filter="url(#ps)"/>
    <path d="M0,0 C-6,-8 -8,-18 -2,-25 C0,-28 2,-28 4,-25 C9,-17 7,-7 0,0Z"
          fill="none" stroke="white" stroke-width="0.3" stroke-opacity="0.3"
          transform="rotate(-58)"/>

  </g>
</svg>
