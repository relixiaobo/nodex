<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=800">
<title>Screenshot 3 — Capture while you browse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 800px; background: #F5F4EE;
    font-family: 'Inter', system-ui, sans-serif; overflow: hidden;
    display: flex; align-items: center; justify-content: center; gap: 80px;
    flex-direction: row-reverse;
  }
  .text-side { max-width: 400px; }
  .text-side h1 {
    font-size: 40px; font-weight: 600; color: #1A1A1A;
    letter-spacing: -1.2px; line-height: 1.15; margin-bottom: 16px;
  }
  .text-side p { font-size: 18px; color: #666; line-height: 1.6; }

  .phone-frame {
    width: 500px; height: 680px; background: #fff; border-radius: 16px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.08), 0 24px 64px rgba(0,0,0,0.06);
    overflow: hidden;
  }
  .phone-frame img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
</style>
</head>
<body>
  <div class="text-side">
    <h1>Capture while you browse</h1>
    <p>Highlight a sentence on any page — it becomes a note instantly. Clip the whole page if you want. Tomorrow your journal references it. Everything stays connected because it was never in a separate app.</p>
  </div>
  <div class="phone-frame">
    <img src="../images/raw-capture.png" alt="Capture">
  </div>
</body>
</html>
