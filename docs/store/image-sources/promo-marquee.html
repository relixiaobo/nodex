<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400, height=560">
<title>soma — Promo Marquee 1400×560</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1400px; height: 560px; background: #F5F4EE;
    font-family: 'Inter', system-ui, sans-serif; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  /* Subtle background shapes */
  .bg-circle { position: absolute; border-radius: 50%; opacity: 0.03; background: #5E8E65; }
  .bg-circle-1 { width: 600px; height: 600px; top: -200px; right: -100px; }
  .bg-circle-2 { width: 400px; height: 400px; bottom: -150px; left: -80px; }

  .content { display: flex; align-items: center; gap: 72px; z-index: 2; }

  /* Text block */
  .text-block { display: flex; flex-direction: column; gap: 16px; }
  .logo-row { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; }
  .logo {
    width: 48px; height: 48px; border-radius: 12px; overflow: hidden;
  }
  .logo img { width: 100%; height: 100%; object-fit: cover; }
  .brand-name { font-size: 28px; font-weight: 500; color: #1A1A1A; letter-spacing: -0.5px; }
  .tagline {
    font-size: 52px; font-weight: 600; color: #1A1A1A;
    letter-spacing: -1.5px; line-height: 1.15; max-width: 520px;
  }
  .tagline em { font-style: normal; color: #5E8E65; }
  .subtitle {
    font-size: 18px; color: #666; line-height: 1.5; max-width: 420px;
  }
  .pill-row {
    display: flex; gap: 8px; align-items: center; margin-top: 4px;
  }
  .pill {
    padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 500;
    letter-spacing: -0.2px;
  }
  .pill-structure { background: rgba(96,138,85,0.1); color: #608A55; }
  .pill-capture  { background: rgba(75,124,158,0.1); color: #4B7C9E; }
  .pill-ai       { background: rgba(225,161,94,0.1); color: #A07830; }
  .pill-arrow { color: #999; font-size: 12px; }

  /* Browser mockup with real screenshot */
  .browser-mock {
    width: 540px; height: 420px; background: #fff; border-radius: 12px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.06), 0 12px 36px rgba(0,0,0,0.08);
    overflow: hidden; display: flex; flex-direction: column;
  }
  .browser-titlebar {
    height: 32px; background: #f0efea; flex-shrink: 0;
    display: flex; align-items: center; padding: 0 12px; gap: 7px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #EC6A5E; } .dot-y { background: #F4BF4F; } .dot-g { background: #61C554; }
  .browser-body {
    flex: 1; overflow: hidden;
  }
  .browser-body img {
    width: 100%; height: 100%; object-fit: cover; object-position: top left;
  }
</style>
</head>
<body>
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>

  <div class="content">
    <div class="text-block">
      <div class="logo-row">
        <div class="logo"><img src="../../../public/icon/128.png" alt="soma"></div>
        <span class="brand-name">soma</span>
      </div>
      <div class="tagline">Notes that <em>think</em> with you.</div>
      <div class="subtitle">A structured notebook and AI thinking partner, right in your browser sidebar.</div>
      <div class="pill-row">
        <span class="pill pill-structure">Structure</span>
        <span class="pill-arrow">→</span>
        <span class="pill pill-capture">Capture</span>
        <span class="pill-arrow">→</span>
        <span class="pill pill-ai">Think with AI</span>
      </div>
    </div>

    <div class="browser-mock">
      <div class="browser-titlebar">
        <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
      </div>
      <div class="browser-body">
        <img src="../images/raw-marquee.png" alt="soma — Today's journal">
      </div>
    </div>
  </div>
</body>
</html>
