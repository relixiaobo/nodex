<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .node-text { font-size: 15px; line-height: 24px; outline: 1px solid #ccc; width: 300px; padding: 10px;}
    .tag { display: inline-flex; height: 20px; align-items: center; font-size: 13px; font-weight: 500; background: #eee; border-radius: 4px; padding: 0 4px; }
  </style>
</head>
<body>
  <div>
    <div class="node-text">
       Design the data model 
       <span class="tag" style="vertical-align: baseline;"># Baseline</span>
       <br>
       Design the data model 
       <span class="tag" style="vertical-align: middle;"># Middle</span>
       <br>
       Design the data model 
       <span class="tag" style="vertical-align: text-bottom;"># Text Btm</span>
       <br>
       Design the data model 
       <span class="tag" style="vertical-align: text-top;"># Text Top</span>
       <br>
       Design the data model 
       <span class="tag" style="vertical-align: -1px;"># -1px</span>
       <br>
       Design the data model 
       <span class="tag" style="vertical-align: 1px;"># 1px</span>
       <br>
       Design the data model 
       <span class="tag" style="vertical-align: 2px;"># 2px</span>
    </div>
  </div>
</body>
</html>
